<div class="min-h-screen bg-gray-100 dark:bg-slate-950 flex flex-col font-sans transition-colors duration-300">

  <nav class="bg-blue-900 dark:bg-slate-900 text-white shadow-md z-10 border-b border-transparent dark:border-slate-800 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        
        <div class="flex items-center gap-3">
          <svg class="w-7 h-7 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          <span class="text-xl font-bold tracking-wider uppercase">
            Emergencias<span class="text-blue-300 font-light">Vehiculares</span>
          </span>
        </div>

        <div class="flex items-center gap-4 sm:gap-6" *ngIf="usuarioActual">
          
          <button 
            (click)="alternarModoOscuro()" 
            class="p-2 rounded-sm bg-blue-800 dark:bg-slate-800 hover:bg-blue-700 dark:hover:bg-slate-700 transition-colors text-blue-200">
            <svg *ngIf="!modoOscuro" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
            <svg *ngIf="modoOscuro" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
          </button>

          <div class="hidden md:flex flex-col items-end border-l border-blue-800 dark:border-slate-700 pl-6">
            <span class="text-sm font-semibold">{{ usuarioActual.nombre_completo }}</span>
            <span class="text-xs text-blue-200 uppercase tracking-wider">{{ usuarioActual.nombre_rol }}</span>
          </div>
          
          <div class="flex items-center gap-2 border-l border-transparent md:border-blue-800 md:dark:border-slate-700 md:pl-6 ml-2 md:ml-0">
            
            <button 
              (click)="navegarA('/perfil')"
              class="flex items-center gap-2 px-3 py-2 rounded-sm text-sm font-medium text-white hover:bg-blue-800 dark:hover:bg-slate-800 transition-colors border border-transparent hover:border-blue-700 dark:hover:border-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              <span class="hidden sm:inline">Perfil</span>
            </button>

            <button 
              (click)="cerrarSesion()"
              class="flex items-center gap-2 px-3 py-2 rounded-sm text-sm font-medium text-white hover:bg-blue-800 dark:hover:bg-slate-800 transition-colors border border-transparent hover:border-blue-700 dark:hover:border-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
              <span class="hidden sm:inline">Salir</span>
            </button>
            
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <div class="mb-8 border-b border-gray-200 dark:border-slate-800 pb-5 transition-colors duration-300">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Panel de Control General</h1>
      <p class="text-sm text-gray-500 dark:text-slate-400 mt-1">Seleccione un módulo para iniciar la gestión operativa.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      
      <div *ngFor="let modulo of modulosFiltrados" 
           (click)="navegarA(modulo.ruta)"
           class="group bg-white dark:bg-slate-900 p-6 border border-gray-200 dark:border-slate-800 rounded-sm shadow-sm hover:shadow-md hover:border-blue-900 dark:hover:border-blue-500 cursor-pointer transition-all duration-200 relative overflow-hidden flex flex-col h-full">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-transparent group-hover:bg-blue-900 dark:group-hover:bg-blue-500 transition-colors"></div>

        <div class="w-12 h-12 bg-gray-100 dark:bg-slate-800 group-hover:bg-blue-50 dark:group-hover:bg-slate-700 text-gray-600 dark:text-slate-300 group-hover:text-blue-900 dark:group-hover:text-blue-400 rounded-sm flex items-center justify-center mb-4 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="modulo.icono"></path>
          </svg>
        </div>

        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2 group-hover:text-blue-900 dark:group-hover:text-blue-400 transition-colors">
          {{ modulo.titulo }}
        </h3>
        <p class="text-sm text-gray-500 dark:text-slate-400 flex-grow leading-relaxed">
          {{ modulo.descripcion }}
        </p>

        <div class="mt-6 flex justify-end">
          <svg class="w-5 h-5 text-gray-300 dark:text-slate-600 group-hover:text-blue-900 dark:group-hover:text-blue-400 transition-colors transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </div>
      </div>

    </div>
  </main>
</div>
