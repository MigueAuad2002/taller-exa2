<div class="h-screen flex overflow-hidden bg-gray-100 dark:bg-slate-950 font-sans transition-colors duration-300">

  <div *ngIf="sidebarAbierto" (click)="cerrarSidebarMobile()" class="fixed inset-0 z-40 bg-gray-900/60 backdrop-blur-sm md:hidden transition-opacity duration-300"></div>

  <aside 
    [ngClass]="sidebarColapsado ? 'w-64 md:w-20' : 'w-64'"
    [class.-translate-x-full]="!sidebarAbierto" 
    [class.translate-x-0]="sidebarAbierto"
    class="fixed md:relative inset-y-0 left-0 z-50 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 transition-all duration-300 md:translate-x-0 flex flex-col h-full shadow-2xl md:shadow-none overflow-hidden">
    
    <div class="h-16 flex items-center justify-between border-b border-gray-200 dark:border-slate-800 shrink-0 gap-3"
         [ngClass]="sidebarColapsado ? 'px-4 md:justify-center md:px-0' : 'px-6'">
      
      <span *ngIf="!sidebarColapsado || sidebarAbierto" class="text-lg font-bold tracking-wider text-gray-900 dark:text-white uppercase truncate">
        EM.<span class="font-light">VEHICULARES</span>
      </span>

      <button (click)="cerrarSidebarMobile()" class="md:hidden p-1.5 text-gray-400 hover:text-red-500 rounded-md hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <nav class="flex-1 overflow-y-auto py-4 scrollbar-thin">
      
      <div class="mb-6" [ngClass]="sidebarColapsado ? 'px-4 md:px-2' : 'px-4'">
        <a routerLink="/home" 
           (click)="cerrarSidebarMobile()"
           [title]="sidebarColapsado ? 'Panel General' : ''"
           class="flex items-center py-2 text-sm font-semibold text-gray-600 dark:text-slate-400 hover:text-blue-900 dark:hover:text-blue-400 bg-gray-50 dark:bg-slate-800/50 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-sm transition-colors border border-transparent hover:border-gray-200 dark:hover:border-slate-700"
           [ngClass]="sidebarColapsado ? 'px-3 gap-3 md:justify-center md:px-0 md:gap-0' : 'px-3 gap-3'">
          <svg class="w-5 h-5 min-w-max" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          <span *ngIf="!sidebarColapsado || sidebarAbierto">Panel General</span>
        </a>
      </div>

      <div *ngFor="let modulo of menuFiltrado" class="mb-4">
        <button (click)="toggleAcordeon(modulo)" 
                [title]="sidebarColapsado ? modulo.titulo : ''"
                class="w-full flex items-center py-2.5 text-left hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors group focus:outline-none"
                [ngClass]="sidebarColapsado ? 'px-6 md:justify-center md:px-0' : 'px-6 justify-between'">
          
          <div class="flex items-center" [ngClass]="sidebarColapsado ? 'gap-3 md:gap-0' : 'gap-3'">
            <svg class="w-5 h-5 min-w-max text-gray-400 dark:text-slate-500 group-hover:text-blue-900 dark:group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="modulo.icono"></path>
            </svg>
            <span *ngIf="!sidebarColapsado || sidebarAbierto" class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-slate-400 group-hover:text-gray-900 dark:group-hover:text-white transition-colors truncate">
              {{ modulo.titulo }}
            </span>
          </div>
          
          <svg *ngIf="!sidebarColapsado || sidebarAbierto" class="w-4 h-4 text-gray-400 transition-transform duration-200" [class.rotate-180]="modulo.expandido" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <div *ngIf="modulo.expandido && (!sidebarColapsado || sidebarAbierto)" class="mt-1 space-y-1">
          <a *ngFor="let sub of modulo.submenus" 
             (click)="cerrarSidebarMobile()"
             [routerLink]="sub.ruta"
             routerLinkActive="bg-blue-50 dark:bg-slate-800 text-blue-900 dark:text-blue-400 border-r-4 border-blue-900 dark:border-blue-500"
             [routerLinkActiveOptions]="{exact: true}"
             class="block pl-14 pr-6 py-2 text-sm font-medium text-gray-600 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors border-r-4 border-transparent truncate">
            {{ sub.nombre }}
          </a>
        </div>
      </div>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 bg-gray-100 dark:bg-slate-950">
    
    <header class="h-16 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0 transition-colors duration-300">
      <div class="flex items-center">
        <button (click)="toggleSidebar()" class="p-2 mr-3 text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-md focus:outline-none transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <span class="hidden md:inline-block text-xs text-gray-500 dark:text-slate-500 uppercase tracking-wider font-bold">Portal Operativo</span>
      </div>

      <div class="flex items-center gap-2 sm:gap-4" *ngIf="usuarioActual">
        
        <div class="relative">
          <button (click)="toggleNotificaciones()" class="p-2 mr-1 rounded-sm text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors relative focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            
            <span *ngIf="cantidadNoLeidas > 0" class="absolute top-1.5 right-1.5 flex h-2.5 w-2.5">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600 border-2 border-white dark:border-slate-900"></span>
            </span>
          </button>

          <div *ngIf="mostrarNotificaciones" class="absolute right-0 mt-2 w-80 bg-white dark:bg-slate-900 rounded-sm shadow-xl border border-gray-200 dark:border-slate-800 flex flex-col overflow-hidden z-[100] animate-fade-in-up origin-top-right">
            <div class="px-4 py-3 border-b border-gray-200 dark:border-slate-800 bg-gray-50 dark:bg-slate-800/50 flex justify-between items-center">
              <h3 class="font-bold text-gray-900 dark:text-white text-sm">Notificaciones</h3>
              <span class="text-[10px] font-bold bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-400 px-2 py-0.5 rounded-sm border border-blue-200 dark:border-blue-800/50">{{ listaNotificaciones.length }} nuevas</span>
            </div>
            
            <div class="overflow-y-auto max-h-[320px] custom-scrollbar">
              
              <div *ngIf="listaNotificaciones.length === 0" class="p-6 text-center">
                <svg class="w-10 h-10 text-gray-300 dark:text-slate-600 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <p class="text-sm text-gray-500 dark:text-slate-400">No tienes alertas pendientes</p>
              </div>

              <div *ngFor="let noti of listaNotificaciones" class="px-4 py-3 border-b border-gray-100 dark:border-slate-800/60 hover:bg-gray-50 dark:hover:bg-slate-800/40 transition-colors cursor-pointer flex gap-3 group">
                <div class="mt-1 flex-shrink-0">
                  <div class="w-8 h-8 rounded-sm bg-red-50 dark:bg-red-900/20 flex items-center justify-center text-red-600 dark:text-red-400 border border-red-100 dark:border-red-800/30">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                  </div>
                </div>
                <div>
                  <p class="text-xs font-bold text-gray-900 dark:text-white mb-0.5">{{ noti.titulo }}</p>
                  <p class="text-[11px] text-gray-600 dark:text-slate-400 line-clamp-2">{{ noti.cuerpo }}</p>
                  <p class="text-[9px] text-gray-400 dark:text-slate-500 mt-1 uppercase tracking-wider font-semibold">{{ noti.fecha | date:'HH:mm:ss' }}</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button (click)="alternarModoOscuro()" class="p-2 rounded-md text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors">
          <svg *ngIf="!modoOscuro" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          <svg *ngIf="modoOscuro" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>

        <div class="hidden md:flex flex-col items-end border-l border-gray-200 dark:border-slate-800 pl-4 sm:pl-6">
          <span class="text-sm font-bold text-gray-900 dark:text-white">{{ usuarioActual.nombre_completo }}</span>
          <span class="text-xs text-blue-900 dark:text-blue-500 uppercase tracking-wider">{{ usuarioActual.nombre_rol }}</span>
        </div>
        
        <div class="flex items-center gap-1 border-l border-transparent md:border-gray-200 md:dark:border-slate-800 md:pl-6 ml-2 md:ml-0">
          <button routerLink="/perfil" class="p-2 text-gray-500 dark:text-slate-400 hover:text-blue-900 dark:hover:text-blue-400 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-md transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </button>
          <button (click)="cerrarSesion()" class="p-2 text-gray-500 dark:text-slate-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-md transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 w-full relative">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
