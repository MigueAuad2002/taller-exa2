name: emergencias_vehiculares
description: Plataforma Integrada de Gestión Operativa - App Móvil
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Estado
  provider: ^6.1.2
  # HTTP
  dio: ^5.4.3
  # Almacenamiento seguro (tokens JWT)
  flutter_secure_storage: ^9.0.0
  # GPS
  geolocator: ^12.0.0
  # UI helpers
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/