name: emergencias_vehiculares
description: Plataforma Integrada de Gestión Operativa - App Móvil
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  geolocator: ^12.0.0
  gap: ^3.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/